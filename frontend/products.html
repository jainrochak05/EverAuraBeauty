<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products & Inventory - Everaura</title>

    <link rel="stylesheet" href="assets/css/all.min.css">
    <link rel="stylesheet" href="assets/css/admin.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>

<body class="admin-body">

    <header class="admin-header">
        <img
            src="assets/images/logo_oldfmy.png"
            alt="Everaura"
            class="admin-logo"
        >

        <button class="logout-btn" onclick="logout()">
            Logout
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </header>

    <nav class="dashboard-nav">
        <div class="nav-container">

            <div class="nav-toggle" onclick="toggleNavMenu()">
                <i class="fa-solid fa-bars"></i>
            </div>

            <ul class="nav-links" id="navMenu">
                <li>
                    <a href="dashboard.html">
                        <i class="fa-solid fa-chart-line"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="products.html">
                        <i class="fa-solid fa-box"></i>
                        Products & Inventory
                    </a>
                </li>

                <li>
                    <a href="orders.html">
                        <i class="fa-solid fa-receipt"></i>
                        Orders
                    </a>
                </li>

                <li>
                    <a href="testimonials.html">
                        <i class="fa-solid fa-comment-dots"></i>
                        Testimonials
                    </a>
                </li>

                <li>
                    <a href="coupons.html">
                        <i class="fa-solid fa-ticket"></i>
                        Coupons
                    </a>
                </li>
            </ul>

        </div>
    </nav>

    <main class="dashboard-main">

        <section class="dashboard-section">

            <div class="dashboard-actions">
                <div>
                    <h1>Products & Inventory</h1>
                    <p>
                        Manage product details and monitor available stock.
                    </p>
                </div>

                <button
                    class="cta-button admin-button"
                    onclick="showAddProductModal()"
                >
                    <i class="fa-solid fa-plus"></i>
                    Add Product
                </button>
            </div>

            <div class="table-container">

                <table class="admin-table">

                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>RSN</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Stock Status</th>
                            <th>Category</th>
                            <th>Gender</th>
                            <th>Type</th>
                            <th>Trending</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="product-table-body">
                        <tr>
                            <td colspan="11">
                                Loading products...
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </section>

    </main>

    <div id="product-modal" class="modal-overlay"></div>

    <footer class="admin-footer">
        <p>&copy; 2026 Everaura Admin Panel</p>
    </footer>

    <script src="assets/js/products.js"></script>

    <script>
        function toggleNavMenu() {
            document
                .getElementById("navMenu")
                .classList.toggle("active");
        }
    </script>

</body>
</html>
