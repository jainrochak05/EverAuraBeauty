<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | Everaura Beauty</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    
    <style>
        body {
            background-color: #050505; /* Deepening the black for maintenance feel */
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .maintenance-wrap {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }

        /* 3D Rotating Circular Logo (Favicon) */
        .logo-3d-container {
            perspective: 1200px;
            margin-bottom: 3.5rem;
        }

        .logo-coin {
            width: 110px;
            height: 110px;
            margin: 0 auto;
            background: url("assets/images/favicon.png") no-repeat center center;
            background-size: contain;
            border-radius: 50%;
            animation: rotateY3D 12s linear infinite;
            filter: drop-shadow(0 0 20px rgba(243, 239, 224, 0.1));
        }

        @keyframes rotateY3D {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        h1 {
            font-family: var(--heading-font);
            font-size: 3.2rem;
            font-style: italic;
            letter-spacing: 5px;
            color: var(--accent-color);
            margin-bottom: 1.2rem;
            text-transform: uppercase;
        }

        .subtext {
            font-family: var(--primary-font);
            font-size: 0.95rem;
            font-weight: 300;
            color: #777;
            letter-spacing: 1.5px;
            max-width: 480px;
            margin: 0 auto 4rem auto;
            line-height: 2;
        }

        /* Admin Entry */
        .admin-entry {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #1a1a1a;
        }

        .admin-login-btn {
            background: transparent;
            color: #444;
            border: 1px solid #333;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
        }

        .admin-login-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* Social Link */
        .mediofusion-link {
            display: block;
            margin-top: 1.5rem;
            color: #555;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .mediofusion-link i { color: var(--accent-color); margin-right: 5px; }

        .maint-footer {
            padding-bottom: 3rem;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="maintenance-wrap">
        <div class="logo-3d-container">
            <div class="logo-coin"></div>
        </div>

        <h1>Evolving the Aura</h1>
        <p class="subtext">
            We are currently refining our digital presence to better reflect the artistry of Everaura. 
            Our collection remains timeless; our experience is simply being polished.
        </p>

        <div class="admin-entry">
            <a href="admin.html" class="admin-login-btn">Secure Admin Login</a>
            <a href="https://instagram.com/mediofusion" class="mediofusion-link" target="_blank">
                <i class="fa-brands fa-instagram"></i>Managed by @mediofusion
            </a>
        </div>
    </div>

    <footer class="maint-footer">
        &copy; 2026 Everaura Beauty. All Rights Reserved.
    </footer>

</body>
</html>
